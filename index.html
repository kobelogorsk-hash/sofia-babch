<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики для 4 игроков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #555;
            min-height: 40px;
        }

        .current-player {
            font-weight: bold;
            font-size: 1.3em;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border: 3px solid #ddd;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cell:hover:not(.taken) {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.player-1 {
            color: #e74c3c;
        }

        .cell.player-2 {
            color: #3498db;
        }

        .cell.player-3 {
            color: #2ecc71;
        }

        .cell.player-4 {
            color: #f39c12;
        }

        .players-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .player-card {
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            min-width: 120px;
        }

        .player-1-card {
            background: #e74c3c;
            color: white;
        }

        .player-2-card {
            background: #3498db;
            color: white;
        }

        .player-3-card {
            background: #2ecc71;
            color: white;
        }

        .player-4-card {
            background: #f39c12;
            color: white;
        }

        .player-card.active {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .winner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .winner-text {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }

        .winner-symbol {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .cell {
                width: 60px;
                height: 60px;
                font-size: 2em;
            }

            h1 {
                font-size: 1.8em;
            }

            .players-info {
                gap: 10px;
            }

            .player-card {
                padding: 10px 15px;
                min-width: 80px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Крестики-Нолики</h1>
        <p style="margin-bottom: 20px; color: #666;">Игра для 4 игроков!</p>
        
        <div class="players-info">
            <div class="player-card player-1-card active" id="player-1-card">
                ❤️ Игрок 1
            </div>
            <div class="player-card player-2-card" id="player-2-card">
                ⭐ Игрок 2
            </div>
            <div class="player-card player-3-card" id="player-3-card">
                ❤️ Игрок 3
            </div>
            <div class="player-card player-4-card" id="player-4-card">
                ⭐ Игрок 4
            </div>
        </div>

        <div class="status">
            Ходит: <span class="current-player" id="current-player">Игрок 1</span>
        </div>

        <div class="board" id="board"></div>

        <button class="btn" onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <div class="winner-modal" id="winner-modal">
        <div class="winner-content">
            <div class="winner-symbol" id="winner-symbol"></div>
            <div class="winner-text" id="winner-text"></div>
            <button class="btn" onclick="resetGame()">🔄 Играть снова</button>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 5;
        const WIN_CONDITION = 4;
        
        let currentPlayer = 1;
        let gameActive = true;
        let board = [];
        
        const players = [
            { id: 1, symbol: '❤️', name: 'Игрок 1', color: '#e74c3c' },
            { id: 2, symbol: '⭐', name: 'Игрок 2', color: '#3498db' },
            { id: 3, symbol: '❤️', name: 'Игрок 3', color: '#2ecc71' },
            { id: 4, symbol: '⭐', name: 'Игрок 4', color: '#f39c12' }
        ];

        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(row, col) {
            if (!gameActive || board[row][col] !== 0) return;
            
            board[row][col] = currentPlayer;
            updateCell(row, col);
            
            if (checkWin(row, col)) {
                endGame(false);
            } else if (checkDraw()) {
                endGame(true);
            } else {
                nextPlayer();
            }
        }

        function updateCell(row, col) {
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            cell.textContent = players[currentPlayer - 1].symbol;
            cell.classList.add('taken', `player-${currentPlayer}`);
        }

        function nextPlayer() {
            currentPlayer = currentPlayer % 4 + 1;
            updateStatus();
        }

        function updateStatus() {
            const currentPlayerElement = document.getElementById('current-player');
            currentPlayerElement.textContent = players[currentPlayer - 1].name;
            currentPlayerElement.style.color = players[currentPlayer - 1].color;
            
            // Update active player card
            document.querySelectorAll('.player-card').forEach((card, index) => {
                card.classList.toggle('active', index + 1 === currentPlayer);
            });
        }

        function checkWin(row, col) {
            const player = board[row][col];
            
            // Directions: horizontal, vertical, diagonal \, diagonal /
            const directions = [
                [[0, -1], [0, 1]],   // horizontal
                [[-1, 0], [1, 0]],   // vertical
                [[-1, -1], [1, 1]],  // diagonal \
                [[-1, 1], [1, -1]]   // diagonal /
            ];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                
                // Check in first direction
                count += countInDirection(row, col, dir1[0], dir1[1], player);
                // Check in opposite direction
                count += countInDirection(row, col, dir2[0], dir2[1], player);
                
                if (count >= WIN_CONDITION) return true;
            }
            
            return false;
        }

        function countInDirection(row, col, dRow, dCol, player) {
            let count = 0;
            let r = row + dRow;
            let c = col + dCol;
            
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                count++;
                r += dRow;
                c += dCol;
            }
            
            return count;
        }

        function checkDraw() {
            return board.every(row => row.every(cell => cell !== 0));
        }

        function endGame(isDraw) {
            gameActive = false;
            const modal = document.getElementById('winner-modal');
            const winnerSymbol = document.getElementById('winner-symbol');
            const winnerText = document.getElementById('winner-text');
            
            if (isDraw) {
                winnerSymbol.textContent = '🤝';
                winnerText.textContent = 'Ничья!';
            } else {
                const winner = players[currentPlayer - 1];
                winnerSymbol.textContent = winner.symbol;
                winnerText.textContent = `🎉 ${winner.name} победил!`;
                winnerText.style.color = winner.color;
            }
            
            modal.style.display = 'flex';
        }

        function resetGame() {
            currentPlayer = 1;
            gameActive = true;
            document.getElementById('winner-modal').style.display = 'none';
            initBoard();
            updateStatus();
        }

        // Initialize game on load
        initBoard();
        updateStatus();
    </script>
</body>
</html>

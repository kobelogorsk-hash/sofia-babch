<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики для 4 игроков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #555;
            min-height: 40px;
        }

        .current-player {
            font-weight: bold;
            font-size: 1.3em;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border: 3px solid #ddd;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cell:hover:not(.taken) {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.player-1,
        .cell.player-3,
        .cell.player-5 {
            color: #e74c3c;
        }

        .cell.player-2,
        .cell.player-4 {
            color: #3498db;
        }

        .cell.team-a {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
        }

        .cell.team-b {
            background: rgba(243, 156, 18, 0.2);
            border-color: #f39c12;
        }

        .players-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .player-card {
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            min-width: 120px;
        }

        .player-1-card,
        .player-3-card,
        .player-5-card {
            background: #e74c3c;
            color: white;
        }

        .player-2-card,
        .player-4-card {
            background: #3498db;
            color: white;
        }

        .player-card.active {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .winner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .winner-text {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }

        .winner-symbol {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .cell {
                width: 60px;
                height: 60px;
                font-size: 2em;
            }

            h1 {
                font-size: 1.8em;
            }

            .players-info {
                gap: 10px;
            }

            .player-card {
                padding: 10px 15px;
                min-width: 80px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Крестики-Нолики 2x2</h1>
        <p style="margin-bottom: 20px; color: #666;">Командная игра! Соберите линию из 5 символов!</p>
        
        <div style="margin-bottom: 20px;">
            <label for="player-count" style="font-size: 1.2em; margin-right: 10px;">Количество игроков:</label>
            <select id="player-count" onchange="changePlayerCount()" style="font-size: 1.2em; padding: 5px 10px; border-radius: 5px;">
                <option value="2">2 игрока</option>
                <option value="3">3 игрока</option>
                <option value="4">4 игрока</option>
                <option value="5">5 игроков</option>
            </select>
        </div>
        
        <div class="players-info" id="players-info">
        </div>

        <div class="status">
            Ходит: <span class="current-player" id="current-player">Игрок 1</span>
        </div>

        <div class="board" id="board"></div>

        <button class="btn" onclick="resetGame()">🔄 Новая игра</button>
    </div>

    <div class="winner-modal" id="winner-modal">
        <div class="winner-content">
            <div class="winner-symbol" id="winner-symbol"></div>
            <div class="winner-text" id="winner-text"></div>
            <button class="btn" onclick="resetGame()">🔄 Играть снова</button>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 5;
        const WIN_CONDITION = 5;
        
        let currentPlayer = 1;
        let gameActive = true;
        let board = [];
        let totalPlayers = 2;
        
        // Team A uses ❤️, Team B uses ⭐ - only 2 symbols regardless of player count
        function getTeamSymbol(team) {
            return team === 'A' ? '❤️' : '⭐';
        }
        
        function getTeamColor(team) {
            return team === 'A' ? '#e74c3c' : '#3498db';
        }
        
        function getTeamForPlayer(playerId) {
            // Odd players (1, 3, 5) are Team A, Even players (2, 4) are Team B
            return playerId % 2 === 1 ? 'A' : 'B';
        }
        
        function getPlayerName(playerId) {
            const team = getTeamForPlayer(playerId);
            const symbol = getTeamSymbol(team);
            return `${symbol} Команда ${team} (Игрок ${playerId})`;
        }
        
        function updatePlayersInfo() {
            const playersInfoElement = document.getElementById('players-info');
            playersInfoElement.innerHTML = '';
            
            for (let i = 1; i <= totalPlayers; i++) {
                const team = getTeamForPlayer(i);
                const symbol = getTeamSymbol(team);
                const card = document.createElement('div');
                card.className = `player-card player-${i}-card${i === currentPlayer ? ' active' : ''}`;
                card.id = `player-${i}-card`;
                card.textContent = `${symbol} Команда ${team} (Игрок ${i})`;
                
                // Set card color based on team
                card.style.background = getTeamColor(team);
                card.style.color = 'white';
                
                playersInfoElement.appendChild(card);
            }
        }
        
        function changePlayerCount() {
            const select = document.getElementById('player-count');
            totalPlayers = parseInt(select.value);
            resetGame();
        }
        
        // Teams: Team A wins with odd players, Team B wins with even players
        function getTeam(playerId) {
            return getTeamForPlayer(playerId);
        }

        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(row, col) {
            if (!gameActive || board[row][col] !== 0) return;
            
            board[row][col] = currentPlayer;
            updateCell(row, col);
            
            if (checkWin(row, col)) {
                endGame(false);
            } else if (checkDraw()) {
                endGame(true);
            } else {
                nextPlayer();
            }
        }

        function updateCell(row, col) {
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            const team = getTeam(currentPlayer);
            const symbol = getTeamSymbol(team);
            cell.textContent = symbol;
            cell.classList.add('taken', `player-${currentPlayer}`);
            
            // Add team class
            cell.classList.add(team === 'A' ? 'team-a' : 'team-b');
        }

        function nextPlayer() {
            currentPlayer = currentPlayer % totalPlayers + 1;
            updateStatus();
        }

        function updateStatus() {
            const currentPlayerElement = document.getElementById('current-player');
            const team = getTeam(currentPlayer);
            const symbol = getTeamSymbol(team);
            const color = getTeamColor(team);
            currentPlayerElement.textContent = `${symbol} Команда ${team} (Игрок ${currentPlayer})`;
            currentPlayerElement.style.color = color;
            
            // Update active player card
            updatePlayersInfo();
        }

        function checkWin(row, col) {
            const player = board[row][col];
            const playerTeam = getTeam(player);
            
            // Directions: horizontal, vertical, diagonal \, diagonal /
            const directions = [
                [[0, -1], [0, 1]],   // horizontal
                [[-1, 0], [1, 0]],   // vertical
                [[-1, -1], [1, 1]],  // diagonal \
                [[-1, 1], [1, -1]]   // diagonal /
            ];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                
                // Check in first direction (count same team)
                count += countInDirectionForTeam(row, col, dir1[0], dir1[1], playerTeam);
                // Check in opposite direction (count same team)
                count += countInDirectionForTeam(row, col, dir2[0], dir2[1], playerTeam);
                
                if (count >= WIN_CONDITION) return true;
            }
            
            return false;
        }

        function countInDirectionForTeam(row, col, dRow, dCol, team) {
            let count = 0;
            let r = row + dRow;
            let c = col + dCol;
            
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                const cellPlayer = board[r][c];
                if (cellPlayer !== 0 && getTeam(cellPlayer) === team) {
                    count++;
                } else {
                    break;
                }
                r += dRow;
                c += dCol;
            }
            
            return count;
        }

        function checkDraw() {
            return board.every(row => row.every(cell => cell !== 0));
        }

        function endGame(isDraw) {
            gameActive = false;
            const modal = document.getElementById('winner-modal');
            const winnerSymbol = document.getElementById('winner-symbol');
            const winnerText = document.getElementById('winner-text');
            
            if (isDraw) {
                winnerSymbol.textContent = '🤝';
                winnerText.textContent = 'Ничья!';
            } else {
                const winningTeam = getTeam(currentPlayer);
                const teamSymbol = getTeamSymbol(winningTeam);
                winnerSymbol.textContent = teamSymbol + ' ' + teamSymbol;
                winnerText.textContent = `🎉 Команда ${winningTeam} победила!`;
                winnerText.style.color = getTeamColor(winningTeam);
            }
            
            modal.style.display = 'flex';
        }

        function resetGame() {
            currentPlayer = 1;
            gameActive = true;
            document.getElementById('winner-modal').style.display = 'none';
            initBoard();
            updatePlayersInfo();
            updateStatus();
        }

        // Initialize game on load
        initBoard();
        updatePlayersInfo();
        updateStatus();
    </script>
</body>
</html>
